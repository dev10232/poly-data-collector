<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rounds Dashboard — Polymarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'media' };
    </script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
  </head>
  <body
    class="min-h-screen bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100"
  >
    <div id="app"></div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
      const { createApp } = Vue;

      function fmtElapsed(sec) {
        if (sec == null || sec === '' || !Number.isFinite(Number(sec)))
          return '-';
        const s = Math.floor(Number(sec));
        const m = Math.floor(s / 60);
        const remainder = s % 60;
        return m + ':' + String(remainder).padStart(2, '0');
      }

      function fmtSlot(row, lowCol, highCol, priceCol) {
        const low = row[lowCol];
        const high = row[highCol];
        const price = row[priceCol];
        const lowStr = fmtElapsed(low);
        const highStr = fmtElapsed(high);
        if (lowStr === '-' || highStr === '-') return '-';
        const p = Number(price);
        const priceStr =
          price != null && price !== '' && Number.isFinite(p)
            ? p.toFixed(2)
            : 'N';
        return lowStr + ' → ' + highStr + ' @ ' + priceStr;
      }

      function fmtStartTime(ts) {
        if (ts == null || !Number.isFinite(Number(ts))) return '-';
        const d = new Date(Number(ts));
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const h = String(d.getHours()).padStart(2, '0');
        const min = String(d.getMinutes()).padStart(2, '0');
        return y + '-' + m + '-' + day + ' ' + h + ':' + min;
      }

      function slotDisplay(up, down) {
        const ok = up !== '-' || down !== '-';
        return ok ? 'Up: ' + up + ' | Down: ' + down : '-';
      }

      createApp({
        data() {
          return {
            rounds: [],
            coins: [],
            coinFilter: '',
            page: 1,
            total: 0,
            totalPages: 0,
            pageSize: 20,
            loading: false,
          };
        },
        computed: {
          formattedRounds() {
            return this.rounds
              .map((r) => {
                const s1Up = fmtSlot(r, 'up_40_ts', 'up_50_elapsed', 's1_price');
                const s1Down = fmtSlot(r, 'down_40_ts', 'down_50_elapsed', 's1_price');
                const s2Up = fmtSlot(r, 'up_50_ts', 'up_62_elapsed', 's2_price');
                const s2Down = fmtSlot(r, 'down_50_ts', 'down_62_elapsed', 's2_price');
                const s3Up = fmtSlot(r, 'up_45_ts', 'up_56_elapsed', 's3_price');
                const s3Down = fmtSlot(r, 'down_45_ts', 'down_56_elapsed', 's3_price');
                const s4Up = fmtSlot(r, 'up_35_ts', 'up_44_elapsed', 's4_price');
                const s4Down = fmtSlot(r, 'down_35_ts', 'down_44_elapsed', 's4_price');
                const s5Up = fmtSlot(r, 'up_43_ts', 'up_54_elapsed', 's5_price');
                const s5Down = fmtSlot(r, 'down_43_ts', 'down_54_elapsed', 's5_price');
                return {
                  ...r,
                  _startTime: fmtStartTime(r.start_ts),
                  _slot1: slotDisplay(s1Up, s1Down),
                  _slot2: slotDisplay(s2Up, s2Down),
                  _slot3: slotDisplay(s3Up, s3Down),
                  _slot4: slotDisplay(s4Up, s4Down),
                  _slot5: slotDisplay(s5Up, s5Down),
                };
              })
              .filter((r) => {
                const allEmpty =
                  r._slot1 === '-' &&
                  r._slot2 === '-' &&
                  r._slot3 === '-' &&
                  r._slot4 === '-' &&
                  r._slot5 === '-';
                return !allEmpty;
              });
          },
        },
        mounted() {
          this.fetchCoins();
          this.fetchRounds();
          this._pollTimer = setInterval(() => this.fetchRounds(true), 4000);
        },
        beforeUnmount() {
          if (this._pollTimer) clearInterval(this._pollTimer);
        },
        watch: {
          coinFilter() {
            this.page = 1;
            this.fetchRounds();
          },
          page() {
            this.fetchRounds();
          },
        },
        methods: {
          async fetchCoins() {
            try {
              const r = await fetch('/api/coins');
              const data = await r.json();
              this.coins = data.coins || [];
            } catch (e) {
              this.coins = [];
            }
          },
          async fetchRounds(silent = false) {
            if (!silent) this.loading = true;
            try {
              const params = new URLSearchParams();
              params.set('page', String(this.page));
              params.set('limit', String(this.pageSize));
              if (this.coinFilter) params.set('coin', this.coinFilter);
              const r = await fetch('/api/rounds?' + params.toString());
              const data = await r.json();
              this.rounds = data.rounds || [];
              this.total = data.total || 0;
              this.totalPages = data.totalPages || 0;
            } catch (e) {
              this.rounds = [];
            } finally {
              if (!silent) this.loading = false;
            }
          },
        },
        template: `
        <div class="container mx-auto px-4 py-8 max-w-[1400px]">
          <header class="mb-6">
            <h1 class="text-2xl font-semibold text-emerald-600 dark:text-emerald-400 tracking-tight">Rounds Dashboard</h1>
            <p class="text-slate-600 dark:text-slate-400 text-sm mt-1">Market rounds from rounds.db — 20 records per page</p>
          </header>

          <div class="flex flex-wrap items-center gap-4 mb-4">
            <div class="flex items-center gap-2">
              <label class="text-sm text-slate-600 dark:text-slate-400">Coin:</label>
              <select
                v-model="coinFilter"
                class="px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 text-sm"
              >
                <option value="">All</option>
                <option v-for="c in coins" :key="c" :value="c">{{ c }}</option>
              </select>
            </div>
            <a
              href="/api/download/rounds"
              download="rounds.db"
              class="inline-flex items-center gap-2 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700/50 text-sm font-medium"
            >
              Download rounds.db
            </a>
          </div>

          <div v-if="loading" class="text-slate-500 text-sm py-4">Loading…</div>

          <div v-else class="overflow-x-auto rounded-xl border border-slate-200 dark:border-slate-700/50 overflow-hidden">
            <table class="w-full text-sm">
              <thead>
                <tr class="bg-slate-100 dark:bg-slate-800/80 text-slate-600 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700/50">
                  <th class="px-4 py-3 text-left font-medium">Coin</th>
                  <th class="px-4 py-3 text-left font-medium">Start time</th>
                  <th class="px-4 py-3 text-left font-medium">Slot 1 (40→50)</th>
                  <th class="px-4 py-3 text-left font-medium">Slot 2 (50→62)</th>
                  <th class="px-4 py-3 text-left font-medium">Slot 3 (45→56)</th>
                  <th class="px-4 py-3 text-left font-medium">Slot 4 (35→44)</th>
                  <th class="px-4 py-3 text-left font-medium">Slot 5 (43→54)</th>
                </tr>
              </thead>
              <tbody>
                <tr
                  v-for="r in formattedRounds"
                  :key="r.id"
                  class="border-b border-slate-200 dark:border-slate-700/30 hover:bg-slate-50 dark:hover:bg-slate-800/30"
                >
                  <td class="px-4 py-3 font-medium">{{ r.coin }}</td>
                  <td class="px-4 py-3 text-slate-600 dark:text-slate-400 font-mono">{{ r._startTime }}</td>
                  <td class="px-4 py-3 text-slate-600 dark:text-slate-400 text-xs whitespace-pre-line">{{ r._slot1 }}</td>
                  <td class="px-4 py-3 text-slate-600 dark:text-slate-400 text-xs whitespace-pre-line">{{ r._slot2 }}</td>
                  <td class="px-4 py-3 text-slate-600 dark:text-slate-400 text-xs whitespace-pre-line">{{ r._slot3 }}</td>
                  <td class="px-4 py-3 text-slate-600 dark:text-slate-400 text-xs whitespace-pre-line">{{ r._slot4 }}</td>
                  <td class="px-4 py-3 text-slate-600 dark:text-slate-400 text-xs whitespace-pre-line">{{ r._slot5 }}</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div v-if="rounds.length === 0 && !loading" class="text-slate-500 text-sm mt-4">No rounds found.</div>

          <div
            v-if="totalPages > 1"
            class="flex items-center justify-between mt-4 text-sm text-slate-600 dark:text-slate-400"
          >
            <span>
              Page {{ page }} of {{ totalPages }} ({{ total }} total)
            </span>
            <div class="flex gap-2">
              <button
                :disabled="page <= 1"
                @click="page = Math.max(1, page - 1)"
                class="px-3 py-1.5 rounded border border-slate-300 dark:border-slate-600 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-slate-100 dark:hover:bg-slate-800"
              >
                Previous
              </button>
              <button
                :disabled="page >= totalPages"
                @click="page = Math.min(totalPages, page + 1)"
                class="px-3 py-1.5 rounded border border-slate-300 dark:border-slate-600 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-slate-100 dark:hover:bg-slate-800"
              >
                Next
              </button>
            </div>
          </div>
        </div>
      `,
      }).mount('#app');
    </script>
  </body>
</html>
